<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss"></style>
    <title>CPN-게시판</title>
  </head>
  <body
    class="flex flex-col max-w-[1440px] h-[100dvh] m-auto bg-white text-neutral-950"
  >
    <!-- HEADER START -->
    <header
      class="top-0 right-0 left-0 z-50 bg-transparent"
      role="navigation"
      aria-label="Main navigation"
    >
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex h-16 items-center justify-between md:h-18">
          <!-- Logo -->
          <a
            class="relative z-50 flex items-center gap-2 text-xl font-extrabold"
            aria-label="cpn.page home"
            href="/"
          >
            <span class="text-neutral-950">
              cpn.page
            </span>
            <span
              class="inline-flex items-center h-5 px-2 text-[10px] font-bold 
              uppercase tracking-wide bg-neutral-950 text-white rounded-full"
            >
              Beta
            </span>
          </a>
          <!-- Desktop Nav -->
          <nav id="navLinks" class="hidden md:flex md:items-center md:gap-1">
            <a href="/map"
              class="px-3 py-2 text-sm font-medium text-neutral-600 hover:text-neutral-950 hover:bg-neutral-100 rounded-lg">
              지도
            </a>

            <a href="/timetable"
              class="px-3 py-2 text-sm font-medium text-neutral-600 hover:text-neutral-950 hover:bg-neutral-100 rounded-lg">
              시간표
            </a>

            <a href="/board"
              class="px-3 py-2 text-sm font-medium text-neutral-600 hover:text-neutral-950 hover:bg-neutral-100 rounded-lg">
              게시판
            </a>

            <a href="/marketplace"
              class="px-3 py-2 text-sm font-medium text-neutral-600 hover:text-neutral-950 hover:bg-neutral-100 rounded-lg">
              중고장터
            </a>
          </nav>
          <div class="hidden md:flex md:items-center md:gap-3">
            <!-- Language Switcher -->
            <div
              class="relative inline-flex items-center p-1 bg-neutral-100 rounded-full"
              role="radiogroup"
              aria-label="Language"
            >
              <button
                class="relative z-10 flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium 
                text-neutral-500 hover:text-neutral-900 transition-colors duration-200 rounded-full"
                role="radio"
                aria-checked="false"
                aria-label="English"
              >
                <a href="#en">
                  <span>🇺🇸</span>
                  <span>EN</span>
                </a>
              </button>
              <button
                class="relative z-10 flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium 
                text-white bg-neutral-950 transition-colors duration-200 rounded-full"
                role="radio"
                aria-checked="true"
                aria-label="한국어"
              >
                <span>🇰🇷</span>
                <span>한국어</span>
              </button>
            </div>
            <!-- logout -->
            <a
              href="#"
              class="inline-flex items-center justify-center w-[100px] px-5 py-2 text-sm font-semibold text-white 
              bg-neutral-950 hover:bg-neutral-800 active:scale-95 transition-colors duration-150 rounded-lg"
            >
              logout
            </a>
          </div>
          <!-- Mobile Button -->
          <button
            id="menuBtn"
            type="button"
            class="relative z-50 md:hidden flex h-10 w-10 items-center justify-center text-neutral-700 
            bg-transparent hover:bg-neutral-100 transition-colors rounded-lg"
            aria-expanded="false"
            aria-label="메뉴 열기"
          >
            <div class="flex flex-col items-center w-5 gap-[5px]">
              <span
                class="block h-[2px] w-5 bg-current transition-all duration-300 rounded-full"
              ></span>
              <span
                class="block h-[2px] w-5 bg-current transition-all duration-300 rounded-full"
              ></span>
              <span
                class="block h-[2px] w-5 bg-current transition-all duration-300 rounded-full"
              ></span>
            </div>
          </button>
        </div>
      </div>
      <!-- Mobile Menu -->
      <div 
        id="mobileMenu"
        class="fixed inset-0 z-40 md:hidden bg-white opacity-0 translate-y-6 
        pointer-events-none transition-opacity transition-transform duration-400 ease-out">
        <div class="flex flex-col h-full pt-20 px-6 pb-8">
          <!-- Mobile Nav -->
          <nav id="mobileNavLinks" class="flex flex-col gap-1">
            <a href="/map"
              class="px-4 py-3 text-lg font-semibold text-neutral-800 hover:bg-neutral-100 rounded-xl">
              지도
            </a>

            <a href="/timetable"
              class="px-4 py-3 text-lg font-semibold text-neutral-800 hover:bg-neutral-100 rounded-xl">
              시간표
            </a>

            <a href="/board"
              class="px-4 py-3 text-lg font-semibold text-neutral-800 hover:bg-neutral-100 rounded-xl">
              게시판
            </a>

            <a href="/marketplace"
              class="px-4 py-3 text-lg font-semibold text-neutral-800 hover:bg-neutral-100 rounded-xl">
              중고장터
            </a>
          </nav>
          <div class="flex flex-col mt-auto gap-4">
            <div class="flex justify-center gap-3">
              <!-- Language Switcher -->
              <div 
                class="relative inline-flex items-center p-1 bg-neutral-100 rounded-full" 
                role="radiogroup" 
                aria-label="Language"
              >
                <button 
                  class="relative z-10 flex items-center px-3 py-1.5 gap-1.5 text-sm font-medium 
                  text-neutral-600 hover:text-neutral-900 transition-colors duration-200 rounded-full"
                  role="radio" 
                  aria-checked="false" 
                  aria-label="English" 
                >
                  <a href="#en">
                    <span>🇺🇸</span>
                    <span>EN</span>
                  </a>
                </button>
                <button 
                  class="relative z-10 flex items-center px-3 py-1.5 gap-1.5 
                  text-sm font-medium text-white bg-neutral-950 rounded-full"
                  role="radio" 
                  aria-checked="true" 
                  aria-label="한국어" 
                >
                  <span>🇰🇷</span>
                  <span>한국어</span>
                </button>
              </div>
            </div>
            <!-- logout -->
            <a 
              href="#" 
              class="flex items-center justify-center px-6 py-3 text-base font-semibold text-white 
              bg-neutral-950 hover:bg-neutral-800 transition-colors duration-150 active:scale-95 rounded-lg"
            >
              logout
            </a>
          </div>
        </div>
      </div>
    </header>
    <!-- MAIN START -->
    <div class="max-w-4xl w-full mx-auto px-4 py-6">
      <!-- 탭 -->
      <div id="tabs" class="flex gap-2 border-b pb-2 mb-4 overflow-x-auto"></div>
      <!-- 게시판 정보 -->
      <div class="flex justify-between items-center mb-4">
        <div>
          <h1 id="boardTitle" class="text-xl font-bold"></h1>
          <p id="boardCount" class="text-sm text-neutral-500"></p>
        </div>
        <a
          href="/post/add/"
          class="inline-flex items-center justify-center px-4 py-2 w-[90px] text-sm font-semibold text-white 
          bg-neutral-900 hover:bg-neutral-800 active:scale-95 transition-colors duration-150 rounded-lg"
          aria-label="게시글 작성"
        >
          글쓰기
        </a>
      </div>
      <!-- 게시글 리스트 -->
      <div id="postList" class="flex flex-col gap-4"></div>
    </div>

    <script>
      // 탭 더미 데이터
      const tabs = [
        { id: "freshman", name: "새내기" },
        { id: "23", name: "23학번" },
        { id: "graduate", name: "졸업생" }
      ];

      // 게시글 더미 데이터 (새내기만)
      const posts = [
        {
          id: 1,
          board: "freshman",
          category: "질문",
          title: "수강신청 어떻게 하나요?",
          content: "이번에 입학했는데 수강신청 너무 어려워요...",
          date: "2026.03.01",
          comments: 3
        },
        {
          id: 2,
          board: "freshman",
          category: "정보",
          title: "OT 일정 공유합니다",
          content: "이번 오리엔테이션 일정은 다음과 같습니다...",
          date: "2026.03.02",
          comments: 1
        },
        {
          id: 3,
          board: "freshman",
          category: "잡담",
          title: "친구 사귀고 싶어요",
          content: "아직 친구가 없어서 같이 밥 먹을 사람 구해요...",
          date: "2026.03.03",
          comments: 5
        }
      ];

      if (!localStorage.getItem("posts")) {
        localStorage.setItem("posts", JSON.stringify(posts));
      }

      let currentTab = "freshman";

      // 탭 렌더링
      function renderTabs() {
        const container = document.getElementById("tabs");
        container.innerHTML = "";

        tabs.forEach(tab => {
          const btn = document.createElement("button");
          btn.textContent = tab.name;

          btn.className =
            "px-4 py-2 text-sm font-semibold rounded-full " +
            (tab.id === currentTab
              ? "bg-neutral-900 text-white"
              : "text-neutral-600 hover:bg-neutral-100");

          btn.onclick = () => {
            currentTab = tab.id;
            renderTabs();
            renderPosts();
          };

          container.appendChild(btn);
        });
      }

      // 게시글 렌더링
      function renderPosts() {
        const list = document.getElementById("postList");
        const title = document.getElementById("boardTitle");
        const count = document.getElementById("boardCount");

        const filtered = posts.filter(p => p.board === currentTab);

        const currentBoardName = tabs.find(t => t.id === currentTab)?.name;

        title.textContent = currentBoardName + " 게시판";
        count.textContent = "전체 글 " + filtered.length;

        list.innerHTML = "";

        filtered.forEach(post => {
          const a = document.createElement("a");

          a.href = `/post/detail/?id=${post.id}`;
          a.className = "block no-underline text-inherit";

          a.innerHTML = `
            <div class="flex gap-4 p-4 border rounded-xl hover:bg-neutral-50 transition cursor-pointer">
              
              <div class="w-16 h-16 bg-neutral-200 rounded-lg flex-shrink-0"></div>

              <div class="flex-1">
                <div class="flex items-center gap-2 mb-1">
                  <span class="text-xs px-2 py-1 bg-neutral-200 rounded">
                    ${post.category}
                  </span>
                  <h2 class="font-semibold text-sm">
                    ${post.title}
                  </h2>
                </div>

                <p class="text-sm text-neutral-600 line-clamp-2">
                  ${post.content}
                </p>

                <div class="text-xs text-neutral-400 mt-2 flex gap-3">
                  <span>${post.date}</span>
                  <span>댓글 ${post.comments}</span>
                </div>
              </div>

            </div>
          `;

          list.appendChild(a);
        });
      }

      // 초기 실행
      renderTabs();
      renderPosts();
    </script>
    <script src="../js/nav.js"></script>
  </body>
</html>
