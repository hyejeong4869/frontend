<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss"></style>
    <title>CPN-글쓰기</title>
  </head>
  <body
    class="flex flex-col max-w-[1440px] h-[100dvh] m-auto bg-white text-neutral-950"
  >
    <!-- HEADER START -->
    <header
      class="top-0 right-0 left-0 z-50 bg-transparent"
      role="navigation"
      aria-label="Main navigation"
    >
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex h-16 items-center justify-between md:h-18">
          <!-- Logo -->
          <a
            class="relative z-50 flex items-center gap-2 text-xl font-extrabold"
            aria-label="cpn.page home"
            href="/"
          >
            <span class="text-neutral-950">
              cpn.page
            </span>
            <span
              class="inline-flex items-center h-5 px-2 text-[10px] font-bold 
              uppercase tracking-wide bg-neutral-950 text-white rounded-full"
            >
              Beta
            </span>
          </a>
          <!-- Desktop Nav -->
          <nav id="navLinks" class="hidden md:flex md:items-center md:gap-1">
            <a href="/map"
              class="px-3 py-2 text-sm font-medium text-neutral-600 hover:text-neutral-950 hover:bg-neutral-100 rounded-lg">
              지도
            </a>

            <a href="/timetable"
              class="px-3 py-2 text-sm font-medium text-neutral-600 hover:text-neutral-950 hover:bg-neutral-100 rounded-lg">
              시간표
            </a>

            <a href="/board"
              class="px-3 py-2 text-sm font-medium text-neutral-600 hover:text-neutral-950 hover:bg-neutral-100 rounded-lg">
              게시판
            </a>

            <a href="/marketplace"
              class="px-3 py-2 text-sm font-medium text-neutral-600 hover:text-neutral-950 hover:bg-neutral-100 rounded-lg">
              중고장터
            </a>
          </nav>
          <div class="hidden md:flex md:items-center md:gap-3">
            <!-- Language Switcher -->
            <div
              class="relative inline-flex items-center p-1 bg-neutral-100 rounded-full"
              role="radiogroup"
              aria-label="Language"
            >
              <button
                class="relative z-10 flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium 
                text-neutral-500 hover:text-neutral-900 transition-colors duration-200 rounded-full"
                role="radio"
                aria-checked="false"
                aria-label="English"
              >
                <a href="#en">
                  <span>🇺🇸</span>
                  <span>EN</span>
                </a>
              </button>
              <button
                class="relative z-10 flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium 
                text-white bg-neutral-950 transition-colors duration-200 rounded-full"
                role="radio"
                aria-checked="true"
                aria-label="한국어"
              >
                <span>🇰🇷</span>
                <span>한국어</span>
              </button>
            </div>
            <!-- logout -->
            <a
              href="#"
              class="inline-flex items-center justify-center w-[100px] px-5 py-2 text-sm font-semibold text-white 
              bg-neutral-950 hover:bg-neutral-800 active:scale-95 transition-colors duration-150 rounded-lg"
            >
              logout
            </a>
          </div>
          <!-- Mobile Button -->
          <button
            id="menuBtn"
            type="button"
            class="relative z-50 md:hidden flex h-10 w-10 items-center justify-center text-neutral-700 
            bg-transparent hover:bg-neutral-100 transition-colors rounded-lg"
            aria-expanded="false"
            aria-label="메뉴 열기"
          >
            <div class="flex flex-col items-center w-5 gap-[5px]">
              <span
                class="block h-[2px] w-5 bg-current transition-all duration-300 rounded-full"
              ></span>
              <span
                class="block h-[2px] w-5 bg-current transition-all duration-300 rounded-full"
              ></span>
              <span
                class="block h-[2px] w-5 bg-current transition-all duration-300 rounded-full"
              ></span>
            </div>
          </button>
        </div>
      </div>
      <!-- Mobile Menu -->
      <div 
        id="mobileMenu"
        class="fixed inset-0 z-40 md:hidden bg-white opacity-0 translate-y-6 
        pointer-events-none transition-opacity transition-transform duration-400 ease-out">
        <div class="flex flex-col h-full pt-20 px-6 pb-8">
          <!-- Mobile Nav -->
          <nav id="mobileNavLinks" class="flex flex-col gap-1">
            <a href="/map"
              class="px-4 py-3 text-lg font-semibold text-neutral-800 hover:bg-neutral-100 rounded-xl">
              지도
            </a>

            <a href="/timetable"
              class="px-4 py-3 text-lg font-semibold text-neutral-800 hover:bg-neutral-100 rounded-xl">
              시간표
            </a>

            <a href="/board"
              class="px-4 py-3 text-lg font-semibold text-neutral-800 hover:bg-neutral-100 rounded-xl">
              게시판
            </a>

            <a href="/marketplace"
              class="px-4 py-3 text-lg font-semibold text-neutral-800 hover:bg-neutral-100 rounded-xl">
              중고장터
            </a>
          </nav>
          <div class="flex flex-col mt-auto gap-4">
            <div class="flex justify-center gap-3">
              <!-- Language Switcher -->
              <div 
                class="relative inline-flex items-center p-1 bg-neutral-100 rounded-full" 
                role="radiogroup" 
                aria-label="Language"
              >
                <button 
                  class="relative z-10 flex items-center px-3 py-1.5 gap-1.5 text-sm font-medium 
                  text-neutral-600 hover:text-neutral-900 transition-colors duration-200 rounded-full"
                  role="radio" 
                  aria-checked="false" 
                  aria-label="English" 
                >
                  <a href="#en">
                    <span>🇺🇸</span>
                    <span>EN</span>
                  </a>
                </button>
                <button 
                  class="relative z-10 flex items-center px-3 py-1.5 gap-1.5 
                  text-sm font-medium text-white bg-neutral-950 rounded-full"
                  role="radio" 
                  aria-checked="true" 
                  aria-label="한국어" 
                >
                  <span>🇰🇷</span>
                  <span>한국어</span>
                </button>
              </div>
            </div>
            <!-- logout -->
            <a 
              href="#" 
              class="flex items-center justify-center px-6 py-3 text-base font-semibold text-white 
              bg-neutral-950 hover:bg-neutral-800 transition-colors duration-150 active:scale-95 rounded-lg"
            >
              logout
            </a>
          </div>
        </div>
      </div>
    </header>

    <!-- Post Add -->
    <main>
      <div class="max-w-3xl w-full mx-auto px-4 py-6">

        <!-- 제목 -->
        <h1 class="text-xl font-bold mb-6">글쓰기</h1>

        <!-- form -->
        <form action="/post/add" method="post" class="flex flex-col gap-5">

            <!-- 카테고리 -->
            <div>
            <label class="block text-sm font-semibold mb-2">카테고리</label>
            <select
                name="category"
                class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-neutral-300"
            >
                <option value="">카테고리 선택</option>
                <option value="질문">질문</option>
                <option value="정보">정보</option>
                <option value="잡담">잡담</option>
            </select>
            </div>

            <!-- 제목 -->
            <div>
            <label class="block text-sm font-semibold mb-2">제목</label>
            <input
                type="text"
                name="title"
                placeholder="제목을 입력하세요"
                class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-neutral-300"
            />
            </div>

            <!-- 내용 -->
            <div>
            <label class="block text-sm font-semibold mb-2">내용</label>
            <textarea
                name="content"
                rows="8"
                placeholder="내용을 입력하세요"
                class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-neutral-300 resize-none"
            ></textarea>
            </div>

            <!-- 버튼 -->
            <div class="flex justify-end gap-2">
            <a
                href="/post"
                class="px-4 py-2 text-sm rounded-lg border text-neutral-600 hover:bg-neutral-100"
            >
                취소
            </a>

            <button
                type="submit"
                class="px-5 py-2 text-sm font-semibold text-white bg-neutral-900 rounded-lg hover:bg-neutral-800 active:scale-95 transition"
            >
                등록
            </button>
            </div>

        </form>
      </div>
    </main>
  </body>
</html>
