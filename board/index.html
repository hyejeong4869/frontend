<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss"></style>
    <title>CPN-board</title>
  </head>
  <body
    class="flex flex-col max-w-[1440px] h-[100dvh] m-auto bg-white text-neutral-950"
  >
    <!-- HEADER START -->
    <header
      class="top-0 right-0 left-0 z-50 bg-transparent"
      role="navigation"
      aria-label="Main navigation"
    >
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex h-16 items-center justify-between md:h-18">
          <!-- Logo -->
          <a
            class="relative z-50 flex items-center gap-2 text-xl font-extrabold"
            aria-label="cpn.page home"
            href="/"
          >
            <span class="text-neutral-950">
              cpn.page
            </span>
            <span
              class="inline-flex items-center h-5 px-2 text-[10px] font-bold 
              uppercase tracking-wide bg-neutral-950 text-white rounded-full"
            >
              Beta
            </span>
          </a>
          <!-- Desktop Nav -->
          <nav id="navLinks" class="hidden md:flex md:items-center md:gap-1"></nav>
          <div class="hidden md:flex md:items-center md:gap-3">
            <!-- Language Switcher -->
            <div
              class="relative inline-flex items-center p-1 bg-neutral-100 rounded-full"
              role="radiogroup"
              aria-label="Language"
            >
              <button
                class="relative z-10 flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium 
                text-neutral-500 hover:text-neutral-900 transition-colors duration-200 rounded-full"
                role="radio"
                aria-checked="false"
                aria-label="English"
              >
                <a href="#en">
                  <span>🇺🇸</span>
                  <span>EN</span>
                </a>
              </button>
              <button
                class="relative z-10 flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium 
                text-white bg-neutral-950 transition-colors duration-200 rounded-full"
                role="radio"
                aria-checked="true"
                aria-label="한국어"
              >
                <span>🇰🇷</span>
                <span>한국어</span>
              </button>
            </div>
            <!-- logout -->
            <a
              href="#"
              class="inline-flex items-center justify-center w-[100px] px-5 py-2 text-sm font-semibold text-white 
              bg-neutral-950 hover:bg-neutral-800 active:scale-95 transition-colors duration-150 rounded-lg"
            >
              logout
            </a>
          </div>
          <!-- Mobile Button -->
          <button
            id="menuBtn"
            type="button"
            class="relative z-50 md:hidden flex h-10 w-10 items-center justify-center text-neutral-700 
            bg-transparent hover:bg-neutral-100 transition-colors rounded-lg"
            aria-expanded="false"
            aria-label="메뉴 열기"
          >
            <div class="flex flex-col items-center w-5 gap-[5px]">
              <span
                class="block h-[2px] w-5 bg-current transition-all duration-300 rounded-full"
              ></span>
              <span
                class="block h-[2px] w-5 bg-current transition-all duration-300 rounded-full"
              ></span>
              <span
                class="block h-[2px] w-5 bg-current transition-all duration-300 rounded-full"
              ></span>
            </div>
          </button>
        </div>
      </div>
      <!-- Mobile Menu -->
      <div 
        id="mobileMenu"
        class="fixed inset-0 z-40 md:hidden bg-white opacity-0 translate-y-6 
        pointer-events-none transition-opacity transition-transform duration-400 ease-out">
        <div class="flex flex-col h-full pt-20 px-6 pb-8">
          <!-- Mobile Nav -->
          <nav id="mobileNavLinks" class="flex flex-col gap-1"></nav>
          <div class="flex flex-col mt-auto gap-4">
            <div class="flex justify-center gap-3">
              <!-- Language Switcher -->
              <div 
                class="relative inline-flex items-center p-1 bg-neutral-100 rounded-full" 
                role="radiogroup" 
                aria-label="Language"
              >
                <button 
                  class="relative z-10 flex items-center px-3 py-1.5 gap-1.5 text-sm font-medium 
                  text-neutral-600 hover:text-neutral-900 transition-colors duration-200 rounded-full"
                  role="radio" 
                  aria-checked="false" 
                  aria-label="English" 
                >
                  <a href="#en">
                    <span>🇺🇸</span>
                    <span>EN</span>
                  </a>
                </button>
                <button 
                  class="relative z-10 flex items-center px-3 py-1.5 gap-1.5 
                  text-sm font-medium text-white bg-neutral-950 rounded-full"
                  role="radio" 
                  aria-checked="true" 
                  aria-label="한국어" 
                >
                  <span>🇰🇷</span>
                  <span>한국어</span>
                </button>
              </div>
            </div>
            <!-- logout -->
            <a 
              href="#" 
              class="flex items-center justify-center px-6 py-3 text-base font-semibold text-white 
              bg-neutral-950 hover:bg-neutral-800 transition-colors duration-150 active:scale-95 rounded-lg"
            >
              logout
            </a>
          </div>
        </div>
      </div>
    </header>
    <!-- MAIN START -->
    <main class="flex flex-col flex-1 h-full top-[300px]">
      <div class="max-w-5xl mx-auto px-4 py-6">

      <!-- 게시글 개수 -->
      <div class="mb-4 text-lg font-semibold">
        전체 글 <span id="totalCount">0</span>
      </div>

      <!-- 테이블 -->
      <div class="bg-white border rounded-xl overflow-hidden">
        <table class="w-full text-sm">
          <tbody id="postTable">
            <!-- JS로 렌더링 -->
          </tbody>
        </table>
      </div>
    </main>

    <script>
    // 🔥 백엔드에서 받아온다고 가정한 데이터
      const posts = [
        {
          id: 1,
          title: "티스토리를 접은지 8개월이 지났습니다.",
          content: "블로그를 떠난 이후 방문자 수와 수익 변화에 대해 정리한 글입니다.",
          category: "일상/개발",
          date: "2023-09-22",
          comments: 4
        },
        {
          id: 2,
          title: "[React] Element 크기 감지 방법",
          content: "ResizeObserver를 활용한 방법을 설명합니다.",
          category: "React",
          date: "2023-01-09",
          comments: 0
        }
      ];

      const table = document.getElementById("postTable");
      const totalCount = document.getElementById("totalCount");

      totalCount.textContent = posts.length;

      function renderPosts() {
        table.innerHTML = posts.map(post => `
          <tr class="border-t hover:bg-neutral-50 cursor-pointer">
            <td class="p-4">
              <!-- 카드 형태 -->
              <div class="flex gap-4">
                <div class="w-16 h-16 flex items-center justify-center text-2xl bg-neutral-200 rounded">
                  📄
                </div>

                <ul class="flex-1">
                  <li class="font-semibold text-base hover:underline">
                    ${post.title}
                  </li>
                  <li class="text-sm text-neutral-600 line-clamp-2">
                    ${post.content}
                  </li>
                  <li class="text-xs text-neutral-500 mt-1">
                    ${post.category} · ${post.date} · 💬 ${post.comments}
                  </li>
                </ul>
              </div>
            </td>
          </tr>
        `).join("");
      }

      renderPosts();
    </script>
  </body>
</html>
